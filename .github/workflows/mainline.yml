name: Mainline Evidence

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-package-evidence:
    name: windows-package-evidence
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Smoke Run Desktop Source
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File tooling/scripts/Invoke-DesktopSandbox.ps1 -SmokeRun -TruncateData -DataRoot (Join-Path $PWD '.sandbox\mainline-smoke')
      - name: Verify Inventory Migration
        shell: cmd
        run: gradlew.bat :shared:inventory:verifyCommonMainInventoryDatabaseMigration --no-daemon
      - name: Build Windows Distribution
        shell: cmd
        run: gradlew.bat :apps:desktop-pos:createDistributable :apps:desktop-pos:packageDistributionForCurrentOS --no-daemon
      - name: Smoke Run Windows Distribution
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File tooling/scripts/Invoke-DesktopDistributionSmoke.ps1
      - name: Run Windows Installer Evidence
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File tooling/scripts/Invoke-WindowsInstallerEvidence.ps1
      - name: Collect Windows Release Diagnostics
        if: always()
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File tooling/scripts/Collect-WindowsReleaseDiagnostics.ps1
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v6
        with:
          name: cassy-desktop-exe
          path: apps/desktop-pos/build/compose/binaries/main/exe/*.exe
          retention-days: 14
      - name: Upload Desktop Distribution
        uses: actions/upload-artifact@v6
        with:
          name: cassy-desktop-app
          path: apps/desktop-pos/build/compose/binaries/main/app/Cassy/**
          retention-days: 14
      - name: Upload Windows MSI
        uses: actions/upload-artifact@v6
        with:
          name: cassy-desktop-msi
          path: apps/desktop-pos/build/compose/binaries/main/msi/*.msi
          retention-days: 14
      - name: Upload Installer Evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: cassy-installer-evidence
          path: build/installer-evidence/**
          retention-days: 14
      - name: Upload Windows Diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: cassy-release-diagnostics
          path: build/release-diagnostics/**
          retention-days: 14
      - name: Upload Windows Failure Reports
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: cassy-windows-debug
          path: |
            apps/desktop-pos/build/reports/**
            apps/desktop-pos/build/compose/logs/**
            build/reports/**
          retention-days: 14

  mainline-evidence-manifest:
    name: mainline-evidence-manifest
    needs: [windows-package-evidence]
    runs-on: ubuntu-latest
    steps:
      - name: Create Manifest
        run: |
          mkdir -p build/mainline-evidence
          {
            echo "commit=${GITHUB_SHA}"
            echo "workflow=${GITHUB_WORKFLOW}"
            echo "windows-package-evidence=${{ needs.windows-package-evidence.result }}"
            echo "desktop-jdk-policy=17"
            echo "local-config-cache=off"
            echo "ci-config-cache=selective"
            echo "windows-installer-evidence=scripted"
            echo "windows-installer-evidence-artifact=cassy-installer-evidence"
            echo "windows-diagnostics-artifact=cassy-release-diagnostics"
            echo "release-candidate-checklist=docs/execution/release_candidate_checklist.md"
            echo "device-support-matrix=docs/execution/desktop_device_support_matrix.md"
            echo "privacy-baseline=PRIVACY.md"
            echo "security-baseline=SECURITY.md"
            echo "eula-baseline=EULA.md"
          } > build/mainline-evidence/release-manifest.txt
      - uses: actions/upload-artifact@v6
        with:
          name: cassy-mainline-evidence
          path: build/mainline-evidence/release-manifest.txt
          retention-days: 14
