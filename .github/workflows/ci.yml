name: CI Safety Net End-to-End

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-wrapper:
    name: 🛡️ Validate Wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/wrapper-validation-action@v3

  static-analysis:
    name: 🔍 Static Analysis
    needs: validate-wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Run Detekt & Build Scan
        run: ./gradlew detekt --scan --no-daemon
      - name: Upload Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-reports
          path: "**/build/reports/detekt/*.xml"

  dependency-guard:
    name: 📦 Dependency Guard
    needs: validate-wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Check Dependencies
        run: ./gradlew dependencyGuard --scan --no-daemon

  android-lane:
    name: 🤖 Android POS
    needs: validate-wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Build & Test Android
        run: ./gradlew :apps:android-pos:assembleDebug :apps:android-pos:testDebugUnitTest :apps:android-pos:lintDebug --scan --no-daemon

  desktop-lane:
    name: 💻 Desktop POS
    needs: validate-wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Build & Test Desktop
        run: ./gradlew :apps:desktop-pos:build --scan --no-daemon

  nightly-packaging:
    name: 📦 Nightly Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [android-lane, desktop-lane]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Package Debian
        run: ./gradlew :apps:desktop-pos:packageDeb --scan --no-daemon
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cassy-desktop-deb
          path: "apps/desktop-pos/build/compose/binaries/main/deb/*.deb"
