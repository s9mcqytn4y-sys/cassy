name: PR Gate

on:
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-wrapper:
    name: validate-wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: gradle/wrapper-validation-action@v3

  repo-authority-fast:
    name: repo-authority-fast
    needs: validate-wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify authority docs
        run: |
          test -f README.md
          test -f CHANGELOG.md
          test -f LICENSE
          test -f EULA.md
          test -f PRIVACY.md
          test -f SECURITY.md
          test -f THIRD_PARTY_NOTICES.md
          test -f docs/execution/roadmap_bridge.md
          test -f docs/execution/repo_reality_sync.md
          test -f docs/execution/release_candidate_checklist.md
          test -f docs/execution/beta_burn_in_checklist.md
          test -f docs/execution/beta_release_readiness.md
          test -f docs/execution/windows_code_signing_posture.md
          test -f docs/execution/desktop_device_support_matrix.md
          test -f docs/user/operator_quickstart.md
          test -f docs/user/daily_operations_guide.md

  shared-fast:
    name: shared-fast
    needs: validate-wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Prepare Gradle Wrapper
        run: chmod +x ./gradlew
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Shared Fast Gate
        run: >
          ./gradlew
          dependencyGuard
          test
          detekt
          :shared:kernel:verifyCommonMainKernelDatabaseMigration
          :shared:inventory:verifyCommonMainInventoryDatabaseMigration
          :shared:masterdata:verifyCommonMainMasterDataDatabaseMigration
          :shared:sales:verifyCommonMainSalesDatabaseMigration
          --configuration-cache
          --scan
          --no-daemon
      - name: Upload Reports
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: pr-gate-shared-debug
          path: |
            **/build/reports/**
            **/build/test-results/**

  android-pos-fast:
    name: android-pos-fast
    needs: validate-wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Prepare Gradle Wrapper
        run: chmod +x ./gradlew
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Build and Test Android
        run: ./gradlew :apps:android-pos:assembleDebug :apps:android-pos:testDebugUnitTest :apps:android-pos:lintDebug --configuration-cache --scan --no-daemon

  desktop-fast:
    name: desktop-fast
    needs: validate-wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Prepare Gradle Wrapper
        run: chmod +x ./gradlew
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Build and Test Desktop
        run: ./gradlew :apps:desktop-pos:build :apps:desktop-pos:smokeRun --no-daemon

  pr-gate-summary:
    name: pr-gate-summary
    if: always()
    needs: [validate-wrapper, repo-authority-fast, shared-fast, android-pos-fast, desktop-fast]
    runs-on: ubuntu-latest
    steps:
      - name: Summarize PR Gate
        run: |
          echo "validate-wrapper=${{ needs.validate-wrapper.result }}"
          echo "repo-authority-fast=${{ needs.repo-authority-fast.result }}"
          echo "shared-fast=${{ needs.shared-fast.result }}"
          echo "android-pos-fast=${{ needs.android-pos-fast.result }}"
          echo "desktop-fast=${{ needs.desktop-fast.result }}"
          test "${{ needs.validate-wrapper.result }}" = "success"
          test "${{ needs.repo-authority-fast.result }}" = "success"
          test "${{ needs.shared-fast.result }}" = "success"
          test "${{ needs.android-pos-fast.result }}" = "success"
          test "${{ needs.desktop-fast.result }}" = "success"
