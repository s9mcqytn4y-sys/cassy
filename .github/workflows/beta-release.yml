name: Beta Release

on:
  push:
    tags:
      - 'v*-beta.*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-beta-artifacts:
    name: windows-beta-artifacts
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Smoke Run Desktop Source
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File tooling/scripts/Invoke-DesktopSandbox.ps1 -SmokeRun -TruncateData -DataRoot (Join-Path $PWD '.sandbox\beta-source-smoke')
      - name: Build Windows Beta Distribution
        shell: cmd
        run: gradlew.bat :apps:desktop-pos:createDistributable :apps:desktop-pos:packageExe :apps:desktop-pos:packageMsi :apps:desktop-pos:smokeRun --no-daemon
      - name: Run Distribution Smoke
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File tooling/scripts/Invoke-DesktopDistributionSmoke.ps1
      - name: Run Installer Evidence
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File tooling/scripts/Invoke-WindowsInstallerEvidence.ps1
      - name: Collect Diagnostics
        if: always()
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File tooling/scripts/Collect-WindowsReleaseDiagnostics.ps1
      - uses: actions/upload-artifact@v6
        with:
          name: cassy-beta-exe
          path: apps/desktop-pos/build/compose/binaries/main/exe/*.exe
          retention-days: 30
      - uses: actions/upload-artifact@v6
        with:
          name: cassy-beta-msi
          path: apps/desktop-pos/build/compose/binaries/main/msi/*.msi
          retention-days: 30
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: cassy-beta-diagnostics
          path: |
            build/release-diagnostics/**
            build/installer-evidence/**
          retention-days: 30

  publish-beta-release:
    name: publish-beta-release
    needs: [windows-beta-artifacts]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Download EXE
        uses: actions/download-artifact@v6
        with:
          name: cassy-beta-exe
          path: build/beta-release/exe
      - name: Download MSI
        uses: actions/download-artifact@v6
        with:
          name: cassy-beta-msi
          path: build/beta-release/msi
      - name: Download Diagnostics
        uses: actions/download-artifact@v6
        with:
          name: cassy-beta-diagnostics
          path: build/beta-release/diagnostics
      - name: Create Release Manifest
        run: |
          mkdir -p build/beta-release
          {
            echo "tag=${GITHUB_REF_NAME}"
            echo "commit=${GITHUB_SHA}"
            echo "generated_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "channel=private-beta"
            echo "checklist=docs/execution/release_candidate_checklist.md"
            echo "burn_in=docs/execution/beta_burn_in_checklist.md"
            echo "readiness=docs/execution/beta_release_readiness.md"
            echo "signing_posture=docs/execution/windows_code_signing_posture.md"
          } > build/beta-release/release-manifest.txt
      - name: Publish GitHub Prerelease
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: true
          generate_release_notes: true
          append_body: true
          body_path: CHANGELOG.md
          files: |
            build/beta-release/exe/*.exe
            build/beta-release/msi/*.msi
            build/beta-release/release-manifest.txt
